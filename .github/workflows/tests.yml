name: JavaScript Tests
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24' # تحديث الإصدار ليتلاشى التحذير
      - run: npm install
      - run: npm test
