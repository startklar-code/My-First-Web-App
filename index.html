<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  
</head>
<body>
  <div class="main-wrapper">
  <div class="todo-container">
    <h2>قائمة مهامي اليومية</h2>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="ماذا ستقوم بفعله اليوم؟">
        <button onclick="addTask()">إضافة مهمة</button>
    </div>
    
    <ul id="taskList">
        </ul>
</div>

<div style="width: 100%; background: #eee; height: 20px; border-radius: 10px; margin-top: 10px;">
    <div id="bar" style="width: 0%; background: blue; height: 100%; border-radius: 10px; transition: 0.5s;"></div>
</div>
  <div class="weather-container">
    <h2>🌤️ طقس العالم</h2>
    <div class="search-box">
        <input type="text" id="cityInput" placeholder="اسم المدينة بالإنجليزية...">
        <button onclick="getWeather()">بحث</button>
    </div>
    <div id="weatherResult" class="weather-info">
        <p>النتائج ستظهر هنا</p>
    </div>
</div>
  </div>   
  <script src="script.js"></script>
  
</body>
</html>
