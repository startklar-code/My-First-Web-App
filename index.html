<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروعي المتكامل</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="todo-container">
            <h2>قائمة مهامي</h2>
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="أضف مهمة...">
                <button onclick="addTask()">إضافة</button>
            </div>
            <ul id="taskList"></ul>
        </div>

        <div class="weather-container">
            <h2>🌤️ طقس العالم</h2>
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="اسم المدينة بالإنجليزية...">
                <button onclick="getWeather()">بحث</button>
            </div>
            <div id="weatherResult" class="weather-info">
                <p> ستظهر هنا</p>
            </div>
        </div>
        <div class="converter-container">
    <h2>💰 محول العملات الذكي</h2>
    <div class="input-group">
        <input type="number" id="usdAmount" placeholder="المبلغ بالدولار ($)">
        <button onclick="convertCurrency()">حول الآن</button>
    </div>
    <div id="result" class="result-box">النتيجة ستظهر هنا</div>
</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
